name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy type-check
        run: uv run mypy src/ agent/ validate/ scripts/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run pytest
        run: uv run pytest tests/ -v --tb=short

  validate-ifc:
    name: IFC Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Generate golden IFC fixtures
        run: |
          uv run python tests/golden_test_simple_room.py
          uv run python tests/golden_test_two_storey.py

      - name: Schema validation — golden fixtures
        run: |
          uv run python validate/schema_validate.py tests/output/golden_simple_room.ifc
          uv run python validate/schema_validate.py tests/output/golden_two_storey.ifc

      - name: IDS validation — golden fixtures
        run: |
          uv run python validate/ids_validate.py tests/output/golden_simple_room.ifc ids/v0.ids
          uv run python validate/ids_validate.py tests/output/golden_two_storey.ifc ids/v0.ids

      - name: Semantic checks — golden fixtures
        run: |
          uv run python validate/semantic_checks.py tests/output/golden_simple_room.ifc
          uv run python validate/semantic_checks.py tests/output/golden_two_storey.ifc

  phase5:
    name: Phase 5 — UI & Distribution
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Phase 5 acceptance tests
        run: uv run pytest tests/test_phase5.py -v --tb=short

      - name: Verify create_blend_template.py --help (no Blender required)
        run: uv run python scripts/create_blend_template.py --
